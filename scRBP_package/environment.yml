name: scrbp
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python=3.10
  - pip

  # Core scientific stack
  - numpy>=1.23,<2.0
  - pandas>=1.5,<2.1
  - scipy>=1.9
  - scikit-learn>=1.1

  # Single-cell
  - anndata>=0.9
  - scanpy>=1.9

  # Fast I/O
  - pyarrow>=10.0

  # pip-only packages
  - pip:
    - loompy>=3.0.7
    - polars>=0.19
    - geosketch>=1.2
    - arboreto>=0.1.6
    - ctxcore>=0.2.0
    - pyscenic>=0.12.1
    - tqdm>=4.64
